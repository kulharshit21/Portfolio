  <!-- Analytics after app boot so it does not compete with LCP / main bundle -->
  <script>
    function loadGtag() {
      var s = document.createElement('script');
      s.src = 'https://www.googletagmanager.com/gtag/js?id=G-FKG3N9MB1D';
      s.async = true;
      s.onload = function () {
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-FKG3N9MB1D');
      };
      document.head.appendChild(s);
    }
    if ('requestIdleCallback' in window) {
      requestIdleCallback(loadGtag, { timeout: 4500 });
    } else {
      window.addEventListener('load', loadGtag, { once: true });
    }
  </script>
</body>
