[build]
  command = "npm run build"
  publish = "dist"

# Hashed Vite assets — cache forever at edge (safe with new deploy).
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML entry — always revalidate so new deploys show up immediately.
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "RECIPIENT,SMTP_HOST,SMTP_PASS,SMTP_PORT,SMTP_USER"

[functions]
  node_bundler = "esbuild"
  directory = "netlify/functions"
  included_files = []

# Redirect /api/contact to the Netlify serverless function
[[redirects]]
  from = "/api/contact"
  to = "/.netlify/functions/contact"
  status = 200

# SPA fallback — serve index.html for all other routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
